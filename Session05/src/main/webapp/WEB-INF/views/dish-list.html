<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Thực đơn nhà hàng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .out-of-stock { color: red; font-weight: bold; }
        .in-stock { color: green; }
    </style>
</head>
<body>
<div class="container mt-5">
    <h2 class="text-center mb-4">Thực đơn</h2>

    <div th:if="${errorMessage}" class="alert alert-danger text-center" th:text="${errorMessage}"></div>

    <div th:if="${#lists.isEmpty(dishes)}" class="alert alert-warning text-center">
        <h4>Hiện tại danh sách trống</h4>
    </div>

    <table th:unless="${#lists.isEmpty(dishes)}" class="table table-bordered table-striped shadow-sm">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Tên món</th>
            <th>Giá</th>
            <th>Trạng thái</th>
            <th>Hành động</th> </tr>
        </thead>
        <tbody>
        <tr th:each="dish : ${dishes}">
            <td th:text="${dish.id}"></td>
            <td th:text="${dish.name}"></td>
            <td th:text="${#numbers.formatDecimal(dish.price, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'"></td>

            <td>
                <span th:if="${dish.available}" class="in-stock">Còn hàng</span>
                <span th:unless="${dish.available}" class="out-of-stock">Hết hàng</span>
            </td>
            <td>
                <a th:href="@{|/bai3/edit/${dish.id}|}" class="btn btn-sm btn-warning">Sửa</a>
            </td>
        </tr>
        </tbody>
    </table>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
