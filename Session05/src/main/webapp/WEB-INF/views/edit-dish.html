<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Chỉnh sửa món ăn</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <div class="card shadow">
        <div class="card-header bg-warning text-dark"><h3>Hiệu chỉnh món ăn</h3></div>
        <div class="card-body">
            <form th:action="@{/bai3/update}" th:object="${dish}" method="post">
                <div class="mb-3">
                    <label class="form-label">ID Món (Read-only):</label>
                    <input type="text" class="form-control bg-light" th:field="*{id}" readonly>
                </div>
                <div class="mb-3">
                    <label class="form-label">Tên món ăn:</label>
                    <input type="text" class="form-control" th:field="*{name}">
                </div>
                <div class="mb-3">
                    <label class="form-label">Giá tiền (VNĐ):</label>
                    <input type="number" class="form-control" th:field="*{price}">
                </div>
                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" th:field="*{available}" id="status">
                    <label class="form-check-label" for="status">Còn phục vụ</label>
                </div>

                <div class="mt-4">
                    <button type="submit" class="btn btn-primary">Lưu thay đổi</button>
                    <a th:href="@{/bai2/menu}" class="btn btn-secondary">Hủy bỏ</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
